<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  tracks = [
    { id: 1370554456, seed: 7, title: 'PINEAPPLE SUBMARINE — BURNING MAN 2022', meta: 'BRIDGING THE NIGHT · BLACK ROCK CITY', url: 'https://soundcloud.com/pineapple-submarine/steve-tam-pineapple-submarine-burning-man-2022' },
    { id: 614332011, seed: 1, title: '1 — SOFTER SONGS WITH WORDS', meta: 'DEEP HOUSE · SONGS WITH WORDS THAT ARE A LITTLE BIT SOFTER', url: 'https://soundcloud.com/steve-tam-1/1-softer-songs-with-words' },
  ];
  state = { playing: -1, progress: {}, durations: {} };
  componentDidMount() {
    this._iframes = [];
    this._widgets = [];
    const bind = () => {
      if (!window.SC || !window.SC.Widget) { this._bt = setTimeout(bind, 300); return; }
      this.tracks.forEach((t, i) => {
        const f = document.createElement('iframe');
        f.setAttribute('allow', 'autoplay');
        f.style.cssText = 'position:fixed;left:-20px;top:-20px;width:2px;height:2px;opacity:0;pointer-events:none;border:0';
        f.src = 'https://w.soundcloud.com/player/?url=https%3A%2F%2Fapi.soundcloud.com%2Ftracks%2F' + t.id + '&auto_play=false&show_artwork=false';
        document.body.appendChild(f);
        this._iframes.push(f);
        const w = SC.Widget(f);
        this._widgets.push(w);
        w.bind(SC.Widget.Events.READY, () => {
          w.getDuration((ms) => {
            if (ms) this.setState((s) => ({ durations: Object.assign({}, s.durations, { [i]: Math.round(ms / 60000) + ' MIN' }) }));
          });
        });
        w.bind(SC.Widget.Events.PLAY, () => {
          this.setState({ playing: i });
          this._widgets.forEach((o, j) => { if (j !== i) o.pause(); });
        });
        w.bind(SC.Widget.Events.PAUSE, () => {
          this.setState((s) => (s.playing === i ? { playing: -1 } : {}));
        });
        w.bind(SC.Widget.Events.PLAY_PROGRESS, (e) => {
          this.setState((s) => ({ progress: Object.assign({}, s.progress, { [i]: e.relativePosition || 0 }) }));
        });
        w.bind(SC.Widget.Events.FINISH, () => {
          this.setState((s) => ({ playing: -1, progress: Object.assign({}, s.progress, { [i]: 0 }) }));
        });
      });
    };
    bind();
  }
  componentWillUnmount() {
    clearTimeout(this._bt);
    (this._iframes || []).forEach((f) => { if (f.parentNode) f.parentNode.removeChild(f); });
  }
  renderVals() {
    const wave = (seed, n, frac) => {
      const bars = [];
      for (let i = 0; i < n; i++) {
        const t = Math.sin(i * 0.55 + seed) * Math.sin(i * 0.13 + seed * 2.7) * Math.sin(i * 0.031 + seed * 1.3);
        const h = Math.round(5 + Math.abs(t) * 25);
        bars.push({ h, c: i < n * frac ? '#fa6552' : 'rgba(227,214,198,.4)' });
      }
      return bars;
    };
    const n = 184;
    return {
      mixes: this.tracks.map((t, i) => ({
        title: t.title,
        meta: t.meta,
        duration: this.state.durations[i] || '',
        bars: wave(t.seed, n, this.state.progress[i] || 0),
        playing: this.state.playing === i,
        notPlaying: this.state.playing !== i,
        toggle: () => { if (this._widgets && this._widgets[i]) this._widgets[i].toggle(); },
        url: t.url,
        stopClick: (e) => { e.stopPropagation(); },
        seek: (e) => {
          e.stopPropagation();
          const w = this._widgets && this._widgets[i];
          if (!w) return;
          const rect = e.currentTarget.getBoundingClientRect();
          const frac = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
          w.getDuration((ms) => {
            if (!ms) return;
            w.seekTo(Math.round(ms * frac));
            this.setState((s) => ({ progress: Object.assign({}, s.progress, { [i]: frac }) }));
            if (this.state.playing !== i) w.play();
          });
        },
      })),
    };
  }
}
</script>
