<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      onDateFocus: (ev) => { ev.currentTarget.type = 'date'; },
      onInquire: (ev) => {
        ev.preventDefault();
        const form = ev.currentTarget;
        const btn = form.querySelector('button[type=submit]');
        // Google Apps Script Web App endpoint — paste your deployed /exec URL here:
        const SHEET_ENDPOINT = 'https://script.google.com/macros/s/AKfycbysZlS5Bzbdfh7CDCIa-XEJDlb3vE06y4E3rN5dMxh4o6QzzZ8DRf2sJqXFLBS01rk/exec';
        const data = {
          name: form.elements.name.value,
          email: form.elements.email.value,
          type: form.elements.type.value,
          date: form.elements.date.value,
          city: form.elements.city.value,
          message: form.elements.message.value,
        };
        if (btn) { btn.textContent = 'SENDING…'; btn.disabled = true; }
        const done = () => { if (btn) { btn.textContent = 'INQUIRY SENT'; btn.style.color = '#fa6552'; } };
        if (SHEET_ENDPOINT) {
          fetch(SHEET_ENDPOINT, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(data) })
            .then(done)
            .catch(() => { if (btn) { btn.textContent = 'FAILED — EMAIL US'; btn.disabled = false; } });
        } else {
          done();
        }
      },
    };
  }
}
</script>
