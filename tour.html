<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100;0,200;0,300;0,400;0,500;0,700;0,800&amp;display=swap" rel="stylesheet">
<style>
html{height:100%}
body{margin:0;height:100%;overflow:hidden;background:#0b0708;color:#e3d6c6;font-family:'JetBrains Mono',monospace;-webkit-font-smoothing:antialiased}
a{color:#e3d6c6;text-decoration:none}a:hover{color:#fa6552}
::selection{background:#a50215;color:#e3d6c6}
@keyframes riseIn{from{opacity:0}to{opacity:1}}
@keyframes pageImg{from{opacity:0;transform:scale(1.015)}to{opacity:1;transform:scale(1)}}
@keyframes blobRoam1{0%{transform:translate(0,0) scale(1)}25%{transform:translate(45%,18%) scale(1.12)}50%{transform:translate(70%,55%) scale(.95)}75%{transform:translate(25%,70%) scale(1.1)}100%{transform:translate(0,0) scale(1)}}
@keyframes blobRoam2{0%{transform:translate(0,0) scale(1)}25%{transform:translate(-35%,-25%) scale(1.15)}50%{transform:translate(-65%,-50%) scale(.9)}75%{transform:translate(-20%,-65%) scale(1.08)}100%{transform:translate(0,0) scale(1)}}

@media (max-width:840px){
  [data-m~=nav]{padding:16px 20px !important;z-index:70 !important}
  [data-m~=logo] div{font-size:22px !important}
  [data-m~=links]{display:none !important}
  [data-m~=burger]{display:flex !important}
  [data-m~=mmenu]{display:flex !important}
  #mnav:checked ~ [data-m~=mmenu]{opacity:1 !important;pointer-events:auto !important}
  #mnav:checked ~ [data-m~=mmenu] a{transform:translateY(0) !important;opacity:1 !important}
  #mnav:checked ~ [data-m~=burger] span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
  #mnav:checked ~ [data-m~=burger] span:nth-child(2){opacity:0}
  #mnav:checked ~ [data-m~=burger] span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
  [data-m~=footer]{flex-wrap:wrap !important;justify-content:center !important;row-gap:10px !important;padding:12px 16px !important;background:rgba(11,7,8,.7) !important}
  [data-m~=footer] > div{justify-content:center !important}
}
@media (max-width:840px){
  [data-m~=cols]{display:flex !important;flex-direction:column !important;gap:26px !important;padding:130px 20px 80px !important;overflow-y:auto !important;height:100vh !important}
  [data-m~=rail] > div:first-child{font-size:44px !important}
  [data-m~=regions]{flex-direction:row !important;flex-wrap:wrap !important;gap:12px 18px !important}
  [data-m~=list]{border-left:none !important;border-top:none !important;height:auto !important;overflow:visible !important;margin-right:0 !important}
  [data-m~=evrow]{grid-template-columns:56px 1fr !important;gap:12px !important;padding:16px 0 !important}
  [data-m~=evrow] > div:nth-child(2) > div:first-child{font-size:17px !important;white-space:normal !important}
  [data-m~=evrow] > div:first-child > div:first-child{font-size:18px !important}
  [data-m~=evbtn]{grid-column:2 !important;justify-self:start !important;padding:9px 14px !important;font-size:9.5px !important;margin-top:2px !important}
}
@media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important}}
</style>
</helmet>

<!-- crowd texture layer -->
<div style="position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;animation:pageImg 3.2s ease-out both">
  <img src="assets/crowd-day.jpg" alt="" aria-hidden="true" style="width:100%;height:100%;object-fit:cover;object-position:48% 58%;filter:grayscale(1) brightness(0.32) contrast(1.1);opacity:.32;transform:scaleX(-1) translateX(min(350px,23%)) translateY(-6.5%) scale(1.87)">
  <div style="position:absolute;inset:0;background:linear-gradient(to bottom,rgba(11,7,8,.52) 0%,rgba(11,7,8,.36) 40%,rgba(11,7,8,.56) 100%)"></div>
</div>

<!-- ambient red blur field -->
<div style="position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden">
  <div style="position:absolute;left:-16%;top:-24%;width:81%;height:94%;background:radial-gradient(ellipse 55% 50% at 40% 45%,rgba(165,2,21,.2) 0%,rgba(71,6,13,.1) 45%,rgba(11,7,8,0) 72%);filter:blur(70px);animation:blobRoam1 56s ease-in-out infinite"></div>
  <div style="position:absolute;right:-19%;bottom:-32%;width:69%;height:88%;background:radial-gradient(ellipse 50% 55% at 55% 55%,rgba(250,101,82,.08) 0%,rgba(165,2,21,.09) 40%,rgba(11,7,8,0) 70%);filter:blur(80px);animation:blobRoam2 72s ease-in-out infinite"></div>
  <div style="position:absolute;left:-23%;bottom:-28%;width:73%;height:85%;background:radial-gradient(ellipse 52% 50% at 45% 55%,rgba(165,2,21,.16) 0%,rgba(71,6,13,.09) 45%,rgba(11,7,8,0) 72%);filter:blur(75px);animation:blobRoam1 64s ease-in-out -20s infinite"></div>
  <div style="position:absolute;inset:0;opacity:.12;mix-blend-mode:overlay;background-image:url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%22160%22&gt;&lt;filter id=%22bn%22&gt;&lt;feTurbulence type=%22fractalNoise%22 baseFrequency=%220.55%22 numOctaves=%223%22/&gt;&lt;/filter&gt;&lt;rect width=%22160%22 height=%22160%22 filter=%22url(%23bn)%22/&gt;&lt;/svg&gt;');background-size:260px 260px;image-rendering:pixelated"></div>
</div>

<!-- grain overlay -->
<div style="position:fixed;inset:0;z-index:60;pointer-events:none;opacity:0.06;background-image:url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%22160%22&gt;&lt;filter id=%22n%22&gt;&lt;feTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%222%22/&gt;&lt;/filter&gt;&lt;rect width=%22160%22 height=%22160%22 filter=%22url(%23n)%22/&gt;&lt;/svg&gt;')"></div>

<!-- nav -->
<nav data-m="nav" style="position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:26px clamp(24px,4vw,56px)">
  <a href="index.html" aria-label="Steve Tam" data-m="logo" style="display:block;width:82px;height:55px;background-color:rgba(227,214,198,.55);-webkit-mask:url('assets/steve-tam-logo.png') no-repeat left center/contain;mask:url('assets/steve-tam-logo.png') no-repeat left center/contain"></a>
  <div data-m="links" style="display:flex;align-items:center;gap:clamp(18px,3vw,36px);font:400 11px/1 'JetBrains Mono',monospace;letter-spacing:.3em">
    <a href="about.html" style="color:rgba(227,214,198,.7)" style-hover="color:#fa6552">STORY</a>
    <a href="sound.html" style="color:rgba(227,214,198,.7)" style-hover="color:#fa6552">SOUND</a>
    <a href="gallery.html" style="color:rgba(227,214,198,.7)" style-hover="color:#fa6552">GALLERY</a>
    <a href="tour.html" style="color:#fa6552">TOUR</a>
    <a href="bookings.html" data-m="pill" style="color:#e3d6c6;border:1px solid rgba(227,214,198,.45);border-radius:999px;padding:12px 22px;transition:background 400ms ease,border-color 400ms ease" style-hover="background:rgba(250,101,82,.18);border-color:#fa6552">BOOKINGS</a>
  </div>
  <input type="checkbox" id="mnav" style="display:none">
  <label for="mnav" data-m="burger" aria-label="Menu" style="display:none;flex-direction:column;gap:5px;cursor:pointer;padding:10px 4px 10px 10px"><span style="display:block;width:24px;height:1.5px;background:#e3d6c6;border-radius:1px;transition:transform .4s cubic-bezier(.2,.6,.2,1),opacity .3s ease"></span><span style="display:block;width:24px;height:1.5px;background:#e3d6c6;border-radius:1px;transition:transform .4s cubic-bezier(.2,.6,.2,1),opacity .3s ease"></span><span style="display:block;width:24px;height:1.5px;background:#e3d6c6;border-radius:1px;transition:transform .4s cubic-bezier(.2,.6,.2,1),opacity .3s ease"></span></label>
  <div data-m="mmenu" style="display:none;position:fixed;inset:0;z-index:-1;flex-direction:column;justify-content:center;gap:30px;padding:0 40px;background:rgba(11,7,8,.97);opacity:0;pointer-events:none;transition:opacity .45s ease">
    <div style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.3em;color:rgba(227,214,198,.4);margin-bottom:6px">MENU</div>
    <a href="about.html" style="display:flex;align-items:baseline;gap:16px;font:200 26px/1 'JetBrains Mono',monospace;letter-spacing:.24em;color:rgba(227,214,198,.88);opacity:0;transform:translateY(12px);transition:opacity .5s ease 0.08s,transform .5s cubic-bezier(.2,.6,.2,1) 0.08s"><span style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.35)">01</span>STORY</a>
    <a href="sound.html" style="display:flex;align-items:baseline;gap:16px;font:200 26px/1 'JetBrains Mono',monospace;letter-spacing:.24em;color:rgba(227,214,198,.88);opacity:0;transform:translateY(12px);transition:opacity .5s ease 0.14s,transform .5s cubic-bezier(.2,.6,.2,1) 0.14s"><span style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.35)">02</span>SOUND</a>
    <a href="gallery.html" style="display:flex;align-items:baseline;gap:16px;font:200 26px/1 'JetBrains Mono',monospace;letter-spacing:.24em;color:rgba(227,214,198,.88);opacity:0;transform:translateY(12px);transition:opacity .5s ease 0.2s,transform .5s cubic-bezier(.2,.6,.2,1) 0.2s"><span style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.35)">03</span>GALLERY</a>
    <a href="tour.html" style="display:flex;align-items:baseline;gap:16px;font:200 26px/1 'JetBrains Mono',monospace;letter-spacing:.24em;color:#fa6552;opacity:0;transform:translateY(12px);transition:opacity .5s ease 0.26s,transform .5s cubic-bezier(.2,.6,.2,1) 0.26s"><span style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.35)">04</span>TOUR</a>
    <a href="bookings.html" style="display:flex;align-items:baseline;gap:16px;font:200 26px/1 'JetBrains Mono',monospace;letter-spacing:.24em;color:rgba(227,214,198,.88);opacity:0;transform:translateY(12px);transition:opacity .5s ease 0.32s,transform .5s cubic-bezier(.2,.6,.2,1) 0.32s"><span style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.35)">05</span>BOOKINGS</a>
    <div style="position:absolute;left:40px;right:40px;bottom:36px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(227,214,198,.16);padding-top:20px">
      <span style="font:700 11px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.55)">SONGS WITH WORDS</span>
      <span style="display:flex;gap:18px">
        <a href="https://www.instagram.com/100stevetam/" target="_blank" rel="noopener" aria-label="Instagram" style="display:block;color:rgba(227,214,198,.7)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4.2"></circle><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"></circle></svg></a>
        <a href="https://soundcloud.com/steve-tam-1" target="_blank" rel="noopener" aria-label="SoundCloud" style="display:block;color:rgba(227,214,198,.7)"><svg width="20" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="12" width="2" height="7" rx="1"></rect><rect x="7" y="9" width="2" height="10" rx="1"></rect><rect x="11" y="6" width="2" height="13" rx="1"></rect><rect x="15" y="8" width="2" height="11" rx="1"></rect><rect x="19" y="11" width="2" height="8" rx="1"></rect></svg></a>
      </span>
    </div>
  </div>
</nav>

<!-- ============ TOUR — single frame ============ -->
<section data-screen-label="Tour" data-m="cols" style="position:relative;z-index:2;height:100vh;box-sizing:border-box;display:grid;grid-template-columns:calc(50vw - clamp(24px,4vw,56px) - clamp(24px,4vw,64px)) 1fr;gap:clamp(24px,4vw,64px);padding:clamp(110px,16vh,170px) clamp(24px,4vw,56px) 68px">

  <!-- left rail -->
  <div data-m="rail" style="animation:riseIn 2s .5s ease-in-out both">
    <div style="font:500 clamp(56px,7vw,110px)/0.95 'JetBrains Mono',monospace;letter-spacing:.02em;color:rgba(227,214,198,.55)">TOUR</div>
    <div style="margin-top:clamp(36px,6vh,64px)">
      <div style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.28em;color:rgba(227,214,198,.45)">SORT REGION:</div>
      <div data-m="regions" style="margin-top:16px;display:flex;flex-direction:column;align-items:flex-start;gap:10px;font:400 12px/1 'JetBrains Mono',monospace;letter-spacing:.12em">
        <sc-for list="{{ regionItems }}" as="r" hint-placeholder-count="4">
          <span onClick="{{ r.onClick }}" style="color:{{ r.color }};text-decoration:{{ r.deco }};text-underline-offset:4px;cursor:pointer;transition:color 300ms ease" style-hover="color:#fa6552">{{ r.label }}</span>
        </sc-for>
      </div>
    </div>
  </div>

  <!-- event list -->
  <div data-m="list" style="display:flex;flex-direction:column;min-width:0;height:100%;box-sizing:border-box;overflow-y:auto;margin-right:calc(-1 * clamp(24px,4vw,56px));border-left:1px solid rgba(227,214,198,.14);border-top:1px solid rgba(227,214,198,.14);animation:riseIn 2.2s .9s ease-in-out both">
    <sc-for list="{{ events }}" as="ev" hint-placeholder-count="5">
      <div data-m="evrow" style="display:grid;grid-template-columns:110px 1fr auto;align-items:center;gap:clamp(16px,3vw,48px);padding:clamp(18px,3.4vh,34px) calc(8px + clamp(24px,4vw,56px)) clamp(18px,3.4vh,34px) clamp(20px,2.5vw,40px);border-bottom:1px solid rgba(227,214,198,.14)">
        <div>
          <div style="font:400 clamp(22px,2.2vw,30px)/1 'JetBrains Mono',monospace">{{ ev.day }}</div>
          <div style="margin-top:8px;font:400 11px/1 'JetBrains Mono',monospace;letter-spacing:.14em;color:rgba(227,214,198,.5)">{{ ev.month }}</div>
        </div>
        <div style="min-width:0">
          <div style="font:500 clamp(20px,1.9vw,32px)/1.15 'JetBrains Mono',monospace;letter-spacing:.04em;overflow-wrap:break-word">{{ ev.city }}</div>
          <div style="margin-top:8px;font:400 11px/1 'JetBrains Mono',monospace;letter-spacing:.18em;color:rgba(227,214,198,.5)">{{ ev.venue }}</div>
        </div>
        <span data-m="evbtn" style="display:inline-flex;align-items:center;gap:8px;font:500 11px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.55);border:1px solid rgba(227,214,198,.4);padding:14px 22px;background:linear-gradient(to top right,transparent calc(50% - .75px),rgba(227,214,198,.5) calc(50% - .75px),rgba(227,214,198,.5) calc(50% + .75px),transparent calc(50% + .75px))">{{ ev.action }}</span>
      </div>
    </sc-for>
  </div>
</section>


<!-- footer -->
<footer data-m="footer" style="position:fixed;left:0;right:0;bottom:0;z-index:55;display:flex;justify-content:space-between;align-items:center;gap:clamp(16px,3vw,40px);padding:22px clamp(24px,4vw,56px);border-top:1px solid rgba(227,214,198,.16)">
  <div style="font:700 clamp(10.8px,1.3vw,17px)/1.4 'JetBrains Mono',monospace;letter-spacing:.22em;color:rgba(227,214,198,.55);white-space:nowrap">SONGS WITH WORDS</div>
  <div style="display:flex;align-items:center;gap:20px">
    <span style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.14em;color:rgba(227,214,198,.45)">© 2026 STEVE TAM, ALL RIGHTS RESERVED</span>
    <a href="https://www.instagram.com/100stevetam/" target="_blank" rel="noopener" aria-label="Instagram" style="display:block;color:rgba(227,214,198,.7)" style-hover="color:#fa6552">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4.2"></circle><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"></circle></svg>
    </a>
    <a href="https://soundcloud.com/steve-tam-1" target="_blank" rel="noopener" aria-label="SoundCloud" style="display:block;color:rgba(227,214,198,.7)" style-hover="color:#fa6552">
      <svg width="20" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="12" width="2" height="7" rx="1"></rect><rect x="7" y="9" width="2" height="10" rx="1"></rect><rect x="11" y="6" width="2" height="13" rx="1"></rect><rect x="15" y="8" width="2" height="11" rx="1"></rect><rect x="19" y="11" width="2" height="8" rx="1"></rect></svg>
    </a>
  </div>
</footer></x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { region: 'ALL' };
  renderVals() {
    const allEvents = [
      { day: '21', month: "FEB '26", city: 'TOKYO', venue: 'PRIVATE EVENT', action: 'TICKETS', region: 'REST OF THE WORLD' },
      { day: '14', month: "MAR '26", city: 'SUN VALLEY', venue: 'PRIVATE EVENT', action: 'TICKETS', region: 'NORTH AMERICA' },
      { day: '18', month: "APR '26", city: 'NEW YORK CITY', venue: 'PRIVATE EVENT', action: 'TICKETS', region: 'NORTH AMERICA' },
      { day: '25–26', month: "APR '26", city: 'MIAMI', venue: 'SUMMIT AT SEA', action: 'TICKETS', region: 'NORTH AMERICA' },
      { day: '16', month: "MAY '26", city: 'TURKEY', venue: 'HARVEST SERIES', action: 'TICKETS', region: 'EUROPE' },
      { day: '23', month: "MAY '26", city: 'NEW JERSEY', venue: 'PRINCETON REUNION', action: 'TICKETS', region: 'NORTH AMERICA' },
      { day: '25', month: "JUL '26", city: 'IBIZA', venue: 'PRIVATE EVENT', action: 'TICKETS', region: 'EUROPE' },
      { day: '05', month: "SEP '26", city: 'BLACK ROCK CITY', venue: 'BURNING MAN', action: 'TICKETS', region: 'NORTH AMERICA' },
    ];
    const sel = this.state.region;
    const regions = ['ALL', 'EUROPE', 'NORTH AMERICA', 'REST OF THE WORLD'];
    return {
      events: sel === 'ALL' ? allEvents : allEvents.filter((e) => e.region === sel),
      regionItems: regions.map((label) => ({
        label,
        color: label === sel ? '#fa6552' : 'rgba(227,214,198,.55)',
        deco: 'none',
        onClick: () => this.setState({ region: label }),
      })),
    };
  }
}
</script>
</body>
</html>
