<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@200;300;400;500&amp;family=JetBrains+Mono:wght@100;200;700;800&amp;display=swap" rel="stylesheet">
<style>
html{height:100%}
body{margin:0;height:100%;overflow:hidden;background:#120a0a;color:#e3d6c6;font-family:'Hanken Grotesk',sans-serif;-webkit-font-smoothing:antialiased}
a{color:#e3d6c6;text-decoration:none}a:hover{color:#fa6552}
::selection{background:#a50215;color:#e3d6c6}
@keyframes heroSettle{from{opacity:0;transform:scale(1.04)}to{opacity:1;transform:scale(1)}}
@keyframes riseIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageImg{from{opacity:0;transform:scale(1.03)}to{opacity:1;transform:scale(1)}}
@keyframes blobRoam1{0%{transform:translate(0,0) scale(1)}25%{transform:translate(45%,18%) scale(1.12)}50%{transform:translate(70%,55%) scale(.95)}75%{transform:translate(25%,70%) scale(1.1)}100%{transform:translate(0,0) scale(1)}}
@keyframes blobRoam2{0%{transform:translate(0,0) scale(1)}25%{transform:translate(-35%,-25%) scale(1.15)}50%{transform:translate(-65%,-50%) scale(.9)}75%{transform:translate(-20%,-65%) scale(1.08)}100%{transform:translate(0,0) scale(1)}}
@keyframes blobWarp1{0%,100%{transform:scale(1,1) skew(0deg,0deg)}25%{transform:scale(1.22,.84) skew(7deg,-4deg)}50%{transform:scale(.86,1.18) skew(-8deg,5deg)}75%{transform:scale(1.12,.92) skew(5deg,-7deg)}}
@keyframes blobWarp2{0%,100%{transform:scale(1,1) skew(0deg,0deg)}25%{transform:scale(.88,1.2) skew(-6deg,5deg)}50%{transform:scale(1.24,.86) skew(8deg,-5deg)}75%{transform:scale(.94,1.1) skew(-5deg,7deg)}}
@keyframes blobHue1{0%,100%{filter:blur(70px) saturate(1.3) hue-rotate(-8deg)}50%{filter:blur(88px) saturate(1.5) hue-rotate(26deg)}}
@keyframes blobHue2{0%,100%{filter:blur(80px) saturate(1.35) hue-rotate(10deg)}50%{filter:blur(64px) saturate(1.5) hue-rotate(-22deg)}}

@media (max-width:840px){
  [data-m~=nav]{padding:16px 20px !important;z-index:70 !important}
  [data-m~=logo] div{font-size:22px !important}
  [data-m~=links]{display:none !important}
  [data-m~=burger]{display:flex !important}
  [data-m~=mmenu]{display:flex !important}
  #mnav:checked ~ [data-m~=mmenu]{opacity:1 !important;pointer-events:auto !important}
  #mnav:checked ~ [data-m~=mmenu] a{transform:translateY(0) !important;opacity:1 !important}
  #mnav:checked ~ [data-m~=burger] span:nth-child(1){transform:translateY(6.5px) rotate(45deg)}
  #mnav:checked ~ [data-m~=burger] span:nth-child(2){opacity:0}
  #mnav:checked ~ [data-m~=burger] span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg)}
  [data-m~=footer]{flex-wrap:wrap !important;justify-content:center !important;row-gap:10px !important;padding:12px 16px !important;background:rgba(11,7,8,.7) !important}
  [data-m~=footer] > div{justify-content:center !important}
}
@media (max-width:840px){
  [data-m~=heroimg]{width:100% !important}
}
@media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important}}
</style>
</helmet>

<!-- grain overlay -->
<sc-if value="{{ grainOn }}" hint-placeholder-val="{{ true }}">
<div style="position:fixed;inset:0;z-index:60;pointer-events:none;opacity:0.06;background-image:url('data:image/svg+xml;utf8,&lt;svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%22160%22&gt;&lt;filter id=%22n%22&gt;&lt;feTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%222%22/&gt;&lt;/filter&gt;&lt;rect width=%22160%22 height=%22160%22 filter=%22url(%23n)%22/&gt;&lt;/svg&gt;')"></div>
</sc-if>

    <a href="sound.html" style="color:rgba(227,214,198,.7)" style-hover="color:#fa6552">SOUND</a>
    <a href="gallery.html" style="color:rgba(227,214,198,.7)" style-hover="color:#fa6552">GALLERY</a>
    <a href="tour.html" style="color:rgba(227,214,198,.7)" style-hover="color:#fa6552">TOUR</a>

    <a href="about.html" style="display:flex;align-items:baseline;gap:16px;font:200 26px/1 'JetBrains Mono',monospace;letter-spacing:.24em;color:rgba(227,214,198,.88);opacity:0;transform:translateY(12px);transition:opacity .5s ease 0.08s,transform .5s cubic-bezier(.2,.6,.2,1) 0.08s"><span style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.35)">01</span>STORY</a>
    <a href="sound.html" style="display:flex;align-items:baseline;gap:16px;font:200 26px/1 'JetBrains Mono',monospace;letter-spacing:.24em;color:rgba(227,214,198,.88);opacity:0;transform:translateY(12px);transition:opacity .5s ease 0.14s,transform .5s cubic-bezier(.2,.6,.2,1) 0.14s"><span style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.35)">02</span>SOUND</a>
    <a href="gallery.html" style="display:flex;align-items:baseline;gap:16px;font:200 26px/1 'JetBrains Mono',monospace;letter-spacing:.24em;color:rgba(227,214,198,.88);opacity:0;transform:translateY(12px);transition:opacity .5s ease 0.2s,transform .5s cubic-bezier(.2,.6,.2,1) 0.2s"><span style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.35)">03</span>GALLERY</a>
    <a href="tour.html" style="display:flex;align-items:baseline;gap:16px;font:200 26px/1 'JetBrains Mono',monospace;letter-spacing:.24em;color:rgba(227,214,198,.88);opacity:0;transform:translateY(12px);transition:opacity .5s ease 0.26s,transform .5s cubic-bezier(.2,.6,.2,1) 0.26s"><span style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.35)">04</span>TOUR</a>
    <a href="bookings.html" style="display:flex;align-items:baseline;gap:16px;font:200 26px/1 'JetBrains Mono',monospace;letter-spacing:.24em;color:rgba(227,214,198,.88);opacity:0;transform:translateY(12px);transition:opacity .5s ease 0.32s,transform .5s cubic-bezier(.2,.6,.2,1) 0.32s"><span style="font:400 10px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.35)">05</span>BOOKINGS</a>
    <div style="position:absolute;left:40px;right:40px;bottom:36px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(227,214,198,.16);padding-top:20px">
      <span style="font:700 11px/1 'JetBrains Mono',monospace;letter-spacing:.2em;color:rgba(227,214,198,.55)">SONGS WITH WORDS</span>
      <span style="display:flex;gap:18px">
        <a href="https://www.instagram.com/100stevetam/" target="_blank" rel="noopener" aria-label="Instagram" style="display:block;color:rgba(227,214,198,.7)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4.2"></circle><circle cx="17.4" cy="6.6" r="1.1" fill="currentColor" stroke="none"></circle></svg></a>
        <a href="https://soundcloud.com/steve-tam-1" target="_blank" rel="noopener" aria-label="SoundCloud" style="display:block;color:rgba(227,214,198,.7)"><svg width="20" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="12" width="2" height="7" rx="1"></rect><rect x="7" y="9" width="2" height="10" rx="1"></rect><rect x="11" y="6" width="2" height="13" rx="1"></rect><rect x="15" y="8" width="2" height="11" rx="1"></rect><rect x="19" y="11" width="2" height="8" rx="1"></rect></svg></a>
